<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="gcpBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="notebookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="trainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="hpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="gcsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="cs" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="gl">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="aO" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f97316"/>
    </marker>
    <marker id="aP" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#a855f7"/>
    </marker>
    <marker id="aG" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="780" rx="20" fill="url(#gcpBg)"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="60" y1="0" x2="60" y2="780"/><line x1="120" y1="0" x2="120" y2="780"/>
    <line x1="180" y1="0" x2="180" y2="780"/><line x1="240" y1="0" x2="240" y2="780"/>
    <line x1="300" y1="0" x2="300" y2="780"/><line x1="360" y1="0" x2="360" y2="780"/>
    <line x1="420" y1="0" x2="420" y2="780"/><line x1="480" y1="0" x2="480" y2="780"/>
    <line x1="540" y1="0" x2="540" y2="780"/><line x1="600" y1="0" x2="600" y2="780"/>
    <line x1="660" y1="0" x2="660" y2="780"/><line x1="720" y1="0" x2="720" y2="780"/>
    <line x1="780" y1="0" x2="780" y2="780"/><line x1="840" y1="0" x2="840" y2="780"/>
    <line x1="900" y1="0" x2="900" y2="780"/><line x1="960" y1="0" x2="960" y2="780"/>
    <line x1="1020" y1="0" x2="1020" y2="780"/><line x1="1080" y1="0" x2="1080" y2="780"/>
    <line x1="1140" y1="0" x2="1140" y2="780"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="660" x2="1200" y2="660"/><line x1="0" y1="720" x2="1200" y2="720"/>
  </g>

  <!-- GCP border -->
  <rect x="30" y="30" width="1140" height="720" rx="14" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.5"/>

  <!-- ==================== NOTEBOOK (top center) ==================== -->
  <g filter="url(#cs)">
    <rect x="350" y="50" width="500" height="210" rx="14" fill="#1a2744" stroke="#3b82f6" stroke-width="2"/>
  </g>
  <rect x="350" y="50" width="500" height="7" rx="3" fill="url(#notebookGrad)"/>

  <g transform="translate(380, 80)">
    <rect x="0" y="0" width="28" height="22" rx="4" fill="none" stroke="#60a5fa" stroke-width="1.8"/>
    <line x1="7" y1="6" x2="21" y2="6" stroke="#60a5fa" stroke-width="1.4"/>
    <line x1="7" y1="11" x2="19" y2="11" stroke="#60a5fa" stroke-width="1.4"/>
    <line x1="7" y1="16" x2="16" y2="16" stroke="#60a5fa" stroke-width="1.4"/>
  </g>
  <text x="420" y="98" fill="#e2e8f0" font-size="20" font-weight="700">Workbench Notebook</text>
  <text x="620" y="98" fill="#64748b" font-size="14" font-weight="500">Lightweight instance</text>

  <g transform="translate(380, 120)">
    <circle cx="7" cy="8" r="4" fill="#3b82f6" opacity="0.6"/>
    <text x="22" y="14" fill="#94a3b8" font-size="16">Explore &amp; visualize data</text>
  </g>
  <g transform="translate(380, 152)">
    <circle cx="7" cy="8" r="4" fill="#3b82f6" opacity="0.6"/>
    <text x="22" y="14" fill="#94a3b8" font-size="16">Launch training &amp; HP tuning jobs</text>
  </g>
  <g transform="translate(380, 184)">
    <circle cx="7" cy="8" r="4" fill="#3b82f6" opacity="0.6"/>
    <text x="22" y="14" fill="#94a3b8" font-size="16">Inspect results &amp; iterate</text>
  </g>

  <!-- Notebook badges -->
  <rect x="680" y="130" width="140" height="26" rx="6" fill="#172540" stroke="#1e3a5f" stroke-width="0.8"/>
  <text x="692" y="148" fill="#fbbf24" font-size="12" font-weight="700">$</text>
  <text x="708" y="148" fill="#64748b" font-size="12">~$0.05–0.50/hr</text>

  <rect x="680" y="164" width="140" height="26" rx="6" fill="#172540" stroke="#1e3a5f" stroke-width="0.8"/>
  <text x="692" y="182" fill="#60a5fa" font-size="12">Eps 2–6  ·  CLI: 8</text>

  <!-- ==================== TRAINING JOB (bottom left) ==================== -->
  <g filter="url(#cs)">
    <rect x="60" y="420" width="500" height="210" rx="14" fill="#2a1f10" stroke="#f97316" stroke-width="2"/>
  </g>
  <rect x="60" y="420" width="500" height="7" rx="3" fill="url(#trainGrad)"/>

  <g transform="translate(90, 450)">
    <rect x="2" y="2" width="22" height="16" rx="3" fill="none" stroke="#fb923c" stroke-width="1.8"/>
    <rect x="7" y="7" width="12" height="7" rx="1" fill="none" stroke="#fb923c" stroke-width="1.2"/>
    <line x1="0" y1="8" x2="2" y2="8" stroke="#fb923c" stroke-width="1.4"/>
    <line x1="0" y1="13" x2="2" y2="13" stroke="#fb923c" stroke-width="1.4"/>
    <line x1="24" y1="8" x2="26" y2="8" stroke="#fb923c" stroke-width="1.4"/>
    <line x1="24" y1="13" x2="26" y2="13" stroke="#fb923c" stroke-width="1.4"/>
  </g>
  <text x="130" y="468" fill="#e2e8f0" font-size="20" font-weight="700">Training Job</text>
  <text x="280" y="468" fill="#64748b" font-size="14" font-weight="500">Vertex AI Custom Training</text>

  <g transform="translate(90, 490)">
    <circle cx="7" cy="8" r="4" fill="#f97316" opacity="0.6"/>
    <text x="22" y="14" fill="#94a3b8" font-size="16">Runs your training script</text>
  </g>
  <g transform="translate(90, 522)">
    <circle cx="7" cy="8" r="4" fill="#f97316" opacity="0.6"/>
    <text x="22" y="14" fill="#94a3b8" font-size="16">Auto-provisions GPUs / RAM</text>
  </g>
  <g transform="translate(90, 554)">
    <circle cx="7" cy="8" r="4" fill="#f97316" opacity="0.6"/>
    <text x="22" y="14" fill="#94a3b8" font-size="16">Shuts down when complete</text>
  </g>

  <!-- Training badges -->
  <rect x="90" y="588" width="120" height="26" rx="6" fill="#261a08" stroke="#f97316" stroke-width="0.8"/>
  <text x="98" y="606" fill="#fbbf24" font-size="12" font-weight="700">$$</text>
  <text x="118" y="606" fill="#64748b" font-size="12">~$1–3/hr GPU</text>

  <rect x="220" y="588" width="100" height="26" rx="6" fill="#261a08" stroke="#3d2508" stroke-width="0.8"/>
  <text x="232" y="606" fill="#fb923c" font-size="12">Eps 4 &amp; 5</text>

  <!-- ==================== HP TUNING JOB (bottom right) ==================== -->
  <g filter="url(#cs)">
    <rect x="640" y="420" width="500" height="210" rx="14" fill="#1f152a" stroke="#a855f7" stroke-width="2"/>
  </g>
  <rect x="640" y="420" width="500" height="7" rx="3" fill="url(#hpGrad)"/>

  <g transform="translate(670, 450)">
    <circle cx="13" cy="6" r="4" fill="none" stroke="#c084fc" stroke-width="1.5"/>
    <line x1="0" y1="6" x2="9" y2="6" stroke="#c084fc" stroke-width="1.4"/>
    <line x1="17" y1="6" x2="26" y2="6" stroke="#c084fc" stroke-width="1.4"/>
    <circle cx="8" cy="16" r="4" fill="none" stroke="#c084fc" stroke-width="1.5"/>
    <line x1="0" y1="16" x2="4" y2="16" stroke="#c084fc" stroke-width="1.4"/>
    <line x1="12" y1="16" x2="26" y2="16" stroke="#c084fc" stroke-width="1.4"/>
  </g>
  <text x="710" y="468" fill="#e2e8f0" font-size="20" font-weight="700">HP Tuning Job</text>
  <text x="880" y="468" fill="#64748b" font-size="14" font-weight="500">Vertex AI / Vizier</text>

  <g transform="translate(670, 490)">
    <circle cx="7" cy="8" r="4" fill="#a855f7" opacity="0.6"/>
    <text x="22" y="14" fill="#94a3b8" font-size="16">Searches hyperparameter space</text>
  </g>
  <g transform="translate(670, 522)">
    <circle cx="7" cy="8" r="4" fill="#a855f7" opacity="0.6"/>
    <text x="22" y="14" fill="#94a3b8" font-size="16">Runs parallel trial jobs on GPUs</text>
  </g>
  <g transform="translate(670, 554)">
    <circle cx="7" cy="8" r="4" fill="#a855f7" opacity="0.6"/>
    <text x="22" y="14" fill="#94a3b8" font-size="16">Returns best config &amp; metrics</text>
  </g>

  <!-- HP badges -->
  <rect x="670" y="588" width="158" height="26" rx="6" fill="#1c1228" stroke="#a855f7" stroke-width="0.8"/>
  <text x="678" y="606" fill="#fbbf24" font-size="12" font-weight="700">$$$</text>
  <text x="704" y="606" fill="#64748b" font-size="12">N trials × GPU cost</text>

  <rect x="838" y="588" width="72" height="26" rx="6" fill="#1c1228" stroke="#2a1740" stroke-width="0.8"/>
  <text x="850" y="606" fill="#c084fc" font-size="12">Ep 6</text>

  <!-- ==================== GCS BUCKET ==================== -->
  <g filter="url(#cs)">
    <rect x="120" y="700" width="960" height="46" rx="12" fill="#0f2922" stroke="#10b981" stroke-width="2"/>
  </g>
  <rect x="120" y="700" width="960" height="6" rx="3" fill="url(#gcsGrad)"/>

  <g transform="translate(145, 716)">
    <ellipse cx="10" cy="3" rx="10" ry="3" fill="none" stroke="#34d399" stroke-width="1.4"/>
    <path d="M0,3 L0,14 Q0,17 10,17 Q20,17 20,14 L20,3" fill="none" stroke="#34d399" stroke-width="1.4"/>
  </g>
  <text x="178" y="732" fill="#e2e8f0" font-size="16" font-weight="700">GCS Bucket</text>

  <g transform="translate(310, 716)">
    <rect x="0" y="0" width="82" height="20" rx="5" fill="#134e3a" stroke="#10b981" stroke-width="0.6"/>
    <text x="41" y="14" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Datasets</text>
    <rect x="92" y="0" width="116" height="20" rx="5" fill="#134e3a" stroke="#10b981" stroke-width="0.6"/>
    <text x="150" y="14" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Model Artifacts</text>
    <rect x="218" y="0" width="56" height="20" rx="5" fill="#134e3a" stroke="#10b981" stroke-width="0.6"/>
    <text x="246" y="14" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Logs</text>
    <rect x="284" y="0" width="72" height="20" rx="5" fill="#134e3a" stroke="#10b981" stroke-width="0.6"/>
    <text x="320" y="14" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Metrics</text>
    <rect x="366" y="0" width="100" height="20" rx="5" fill="#134e3a" stroke="#10b981" stroke-width="0.6"/>
    <text x="416" y="14" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Checkpoints</text>
    <rect x="476" y="0" width="100" height="20" rx="5" fill="#134e3a" stroke="#10b981" stroke-width="0.6"/>
    <text x="526" y="14" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="500">Trial Results</text>
  </g>

  <!-- ==================== ARROWS ==================== -->

  <!-- Notebook → Training (down-left) -->
  <path d="M480,260 L480,340 L310,340 L310,412" stroke="#f97316" stroke-width="3" fill="none" marker-end="url(#aO)" filter="url(#gl)"/>
  <rect x="370" y="326" width="88" height="26" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="414" y="344" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">submit</text>

  <!-- Notebook → HP Tuning (down-right) -->
  <path d="M720,260 L720,340 L890,340 L890,412" stroke="#a855f7" stroke-width="3" fill="none" marker-end="url(#aP)" filter="url(#gl)"/>
  <rect x="742" y="326" width="88" height="26" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="786" y="344" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">submit</text>

  <!-- Training → GCS -->
  <line x1="310" y1="630" x2="310" y2="694" stroke="#10b981" stroke-width="2.5" marker-end="url(#aG)" filter="url(#gl)"/>
  <rect x="320" y="656" width="126" height="24" rx="5" fill="#1e293b" stroke="#475569" stroke-width="0.7"/>
  <text x="383" y="673" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">save artifacts</text>

  <!-- Notebook → GCS (comes down from notebook, between the two job cards) -->
  <path d="M600,260 L600,370 L600,694" stroke="#10b981" stroke-width="2.5" marker-end="url(#aG)" filter="url(#gl)" opacity="0.7"/>
  <rect x="545" y="656" width="110" height="24" rx="5" fill="#1e293b" stroke="#475569" stroke-width="0.7"/>
  <text x="600" y="673" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">read / write</text>

  <!-- HP Tuning → GCS -->
  <line x1="890" y1="630" x2="890" y2="694" stroke="#10b981" stroke-width="2.5" marker-end="url(#aG)" filter="url(#gl)"/>
  <rect x="775" y="656" width="106" height="24" rx="5" fill="#1e293b" stroke="#475569" stroke-width="0.7"/>
  <text x="828" y="673" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">save trials</text>
</svg>