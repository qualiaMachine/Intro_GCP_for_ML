  <text x="668" y="404" fill="#e2e8f0" font-size="20" font-weight="700">RAG Pipeline</text>
  <text x="668" y="426" fill="#64748b" font-size="14" font-weight="500">Retrieval-Augmented Generation</text>

  <g transform="translate(630, 452)">
    <rect x="0" y="0" width="24" height="24" rx="12" fill="#164e63" stroke="#06b6d4" stroke-width="1.2"/>
