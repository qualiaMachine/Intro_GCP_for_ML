    <text x="34" y="17" fill="#94a3b8" font-size="16">Retrieve relevant doc chunks</text>
  </g>
  <g transform="translate(630, 488)">
    <rect x="0" y="0" width="24" height="24" rx="12" fill="#164e63" stroke="#06b6d4" stroke-width="1.2"/>
    <text x="12" y="17" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700">2</text>
    <text x="34" y="17" fill="#94a3b8" font-size="16">Inject context into Gemini prompt</text>
  </g>
  <g transform="translate(630, 524)">
    <rect x="0" y="0" width="24" height="24" rx="12" fill="#164e63" stroke="#06b6d4" stroke-width="1.2"/>
    <text x="12" y="17" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700">3</text>
    <text x="34" y="17" fill="#94a3b8" font-size="16">Return grounded answer</text>
  </g>

