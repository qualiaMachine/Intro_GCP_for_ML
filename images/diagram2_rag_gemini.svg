    <line x1="420" y1="0" x2="420" y2="780"/><line x1="480" y1="0" x2="480" y2="780"/>
    <line x1="540" y1="0" x2="540" y2="780"/><line x1="600" y1="0" x2="600" y2="780"/>
    <line x1="660" y1="0" x2="660" y2="780"/><line x1="720" y1="0" x2="720" y2="780"/>
    <line x1="780" y1="0" x2="780" y2="780"/><line x1="840" y1="0" x2="840" y2="780"/>
    <line x1="900" y1="0" x2="900" y2="780"/><line x1="960" y1="0" x2="960" y2="780"/>
    <line x1="1020" y1="0" x2="1020" y2="780"/><line x1="1080" y1="0" x2="1080" y2="780"/>
    <line x1="1140" y1="0" x2="1140" y2="780"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
