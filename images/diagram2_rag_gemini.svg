  </g>
  <rect x="60" y="680" width="480" height="6" rx="3" fill="url(#gcsGrad2)"/>

  <g transform="translate(85, 698)">
    <ellipse cx="10" cy="3" rx="10" ry="3" fill="none" stroke="#34d399" stroke-width="1.4"/>
    <path d="M0,3 L0,14 Q0,17 10,17 Q20,17 20,14 L20,3" fill="none" stroke="#34d399" stroke-width="1.4"/>
  </g>
  <text x="118" y="715" fill="#e2e8f0" font-size="16" font-weight="700">GCS Bucket</text>

  <g transform="translate(248, 700)">
    <rect x="0" y="0" width="110" height="22" rx="5" fill="#134e3a" stroke="#10b981" stroke-width="0.6"/>
    <text x="55" y="16" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="500">Documents</text>
    <rect x="120" y="0" width="118" height="22" rx="5" fill="#134e3a" stroke="#10b981" stroke-width="0.6"/>
    <text x="179" y="16" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="500">Embeddings</text>
  </g>

  <!-- ==================== ARROWS ==================== -->

  <!-- Notebook → Gemini (API calls) -->
  <path d="M460,210 L592,170" stroke="#ec4899" stroke-width="3" fill="none" marker-end="url(#aPk)" filter="url(#gl2)"/>
  <rect x="480" y="172" width="90" height="26" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="525" y="190" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">API calls</text>

  <!-- Gemini → Notebook (response) -->
  <path d="M592,220 L460,260" stroke="#ec4899" stroke-width="2" fill="none" stroke-dasharray="8 4" opacity="0.6"/>
  <rect x="484" y="242" width="90" height="24" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="529" y="259" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="500">responses</text>

  <!-- Notebook → RAG (orchestrate) -->
  <path d="M460,340 L592,460" stroke="#06b6d4" stroke-width="2.5" fill="none" marker-end="url(#aCy)" filter="url(#gl2)" opacity="0.8"/>
  <rect x="472" y="385" width="100" height="26" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="522" y="403" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">orchestrate</text>

  <!-- Gemini ↔ RAG -->
  <line x1="870" y1="310" x2="870" y2="352" stroke="#64748b" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- GCS → Notebook (read docs) -->
  <line x1="260" y1="680" x2="260" y2="447" stroke="#10b981" stroke-width="2.5" marker-end="url(#aBl)" filter="url(#gl2)"/>
  <rect x="268" y="560" width="100" height="24" rx="6" fill="#1e293b" stroke="#475569" stroke-width="0.7"/>
  <text x="318" y="577" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">read docs</text>
</svg>