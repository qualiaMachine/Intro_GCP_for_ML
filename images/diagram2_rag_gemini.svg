  <text x="116" y="356" fill="#64748b" font-size="12">~$0.05–0.50/hr</text>

  <rect x="230" y="338" width="126" height="26" rx="6" fill="#172540" stroke="#1e3a5f" stroke-width="0.8"/>
  <text x="242" y="356" fill="#60a5fa" font-size="12">Ep 7  ·  CLI: Ep 8</text>

